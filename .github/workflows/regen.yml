name: regen-and-deploy

# Rebuild the PEP 503 simple index from current GitHub Release assets across
# the pd-* repos and deploy via GitHub Pages.
#
# Triggers:
#   - schedule: every 15 minutes (safety net — catches releases we didn't
#     receive a dispatch for, e.g. if a pd-* repo's release.yml hasn't been
#     wired to ping us yet).
#   - workflow_dispatch: manual rebuild from the Actions tab.
#   - repository_dispatch type=pd-release-published: fired by individual pd-*
#     repos after their release.yml publishes a new GitHub Release. Lets the
#     index update instantly instead of waiting up to 15 min.
#
# Read-only public GitHub API access is enough for the regen script — the
# default GITHUB_TOKEN can list releases on any public repo, no PAT needed.

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
  repository_dispatch:
    types: [pd-release-published]
  push:
    branches: [main]
    paths:
      - "scripts/regen_index.py"
      - ".github/workflows/regen.yml"

permissions:
  contents: read
  pages: write
  id-token: write

# Opt into Node 24 now; Node 20 is deprecated on the runner and will be the
# default in June 2026. Most pinned actions below are still on Node 20 today
# (no Node-24-native release available) — this env var forces them onto 24.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# Don't queue Pages deployments — if a newer regen kicks off mid-deploy,
# let it finish and then run again. cancel-in-progress: false is the
# documented setting for Pages workflows.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Regenerate simple index
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/regen_index.py --out _site/simple

      - name: Add a friendly root landing page
        run: |
          cat > _site/index.html <<'HTML'
          <!DOCTYPE html>
          <html><head><title>pd-index</title></head><body>
          <h1>pd-index</h1>
          <p>Self-hosted PEP 503 simple Python package index for the
          <code>pd-*</code> repos under
          <a href="https://github.com/ConcaveTrillion">ConcaveTrillion</a>.</p>
          <p>The index lives at <a href="simple/">simple/</a>.</p>
          <p>Source: <a href="https://github.com/ConcaveTrillion/pd-index">github.com/ConcaveTrillion/pd-index</a></p>
          </body></html>
          HTML

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
